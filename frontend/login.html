<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Bridge</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">
<div class="login-card">
<h1>📚 Book Bridge</h1>
<p class="tagline" id="tagline">Login to continue</p>
<form id="loginForm">
    <div class="role-switch" style="margin-bottom:10px; gap:10px; justify-content:center;">
        <button type="button" onclick="setRole('user', this)" class="active">User</button>
        <button type="button" onclick="setRole('admin', this)">Admin</button>
    </div>
    <input type="text" id="username" placeholder="Username OR Email" required>
    <input type="email" id="email" placeholder="Email" style="display:none;">
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="adminKey" placeholder="Admin Secret Key" style="display:none;">
    <button type="submit" id="submitBtn">Login</button>
    <p class="switch-text">
        <span id="switchText">New user?</span> 
        <span id="toggleMode" style="cursor:pointer; color:green;">Register here</span>
    </p>
</form>
</div>

<script src="js/config.js"></script>
<script src="js/login.js"></script>

</body>
</html>
